<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shirei</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <div id="titlebar" data-tauri-drag-region>
      <button id="titlebar-sidebar" type="button" title="Show or hide the directory">
        <span class="ts-icon" aria-hidden="true"></span>
      </button>
      <span id="app-title">指令 Shirei</span>
      <button id="titlebar-search" type="button" title="Search file or launch project">
        <span class="ts-icon" aria-hidden="true"></span>
        <span class="ts-label">Search…</span>
        <kbd class="ts-key"></kbd>
      </button>
    </div>
    <div id="tabbar" data-tauri-drag-region></div>
    <div id="main">
      <aside id="sidepanel" class="hidden">
        <div id="tree-region"></div>
        <div id="todo-divider" class="hidden"></div>
        <div id="todopanel" class="hidden"></div>
      </aside>
      <div id="sidebar-divider" class="hidden"></div>
      <div id="terminals"></div>
    </div>
    <div id="statusbar" class="hidden"></div>
  </body>
</html>
