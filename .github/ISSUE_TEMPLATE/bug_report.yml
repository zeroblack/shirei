name: Bug report
description: Report a problem with Shirei
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug. Please fill in the details below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what went wrong.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. 15.2
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Shirei version
      placeholder: e.g. 0.12.0
    validations:
      required: true
  - type: dropdown
    id: renderer
    attributes:
      label: Renderer
      options:
        - WebGL (default)
        - DOM (fallback)
        - Not sure
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output, if any.
      render: shell
    validations:
      required: false
